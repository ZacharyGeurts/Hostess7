<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hostess 7 — NEXUS C2 Boot</title>
  <meta name="description" content="NEXUS C2 through KILROY to AmmoOS desktop and Queen Browser on GitHub Pages." />
  <meta name="theme-color" content="#020403" />
  <link rel="stylesheet" href="pages-boot.css" />
  <script src="pages-base.js"></script>
  <script src="api-shim.js"></script>
  <script>
    (function () {
      try {
        if (sessionStorage.getItem("hostess7-pages-booted") === "1") {
          var b = window.HOSTESS7_PAGES_BASE || "";
          location.replace(b + "/desktop/");
        }
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <main class="boot-wrap" aria-live="polite">
    <div class="boot-seal">
      <p class="boot-eyebrow">Hostess 7 · GitHub Pages</p>
      <h1 class="boot-title">NEXUS C2</h1>
      <p class="boot-stage" id="boot-stage">Initializing…</p>
      <p class="boot-detail" id="boot-detail">G16 field_opt · sovereign stack wiring</p>
      <div class="boot-track"><div class="boot-bar" id="boot-bar"></div></div>
      <p class="boot-pct" id="boot-pct">0%</p>
      <div class="boot-stack" aria-label="Stack">
        <span class="boot-pill">NEXUS C2</span>
        <span class="boot-pill">KILROY</span>
        <span class="boot-pill">ZNetwork</span>
        <span class="boot-pill">AmmoOS</span>
        <span class="boot-pill">Queen</span>
      </div>
    </div>
  </main>
  <script src="pages-boot.js"></script>
</body>
</html>
