<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#040810" />
  <title>Universal Protector · Field entry</title>
  <meta name="description" content="NEXUS Universal Protector — autonomous being field stack." />
  <link rel="stylesheet" href="/assets/dusty-midnight.css" />
  <style>
    :root { --bg: #040810; --text: #e8f2ff; --gold: #f0d060; --phi: #38bdf8; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #152040 0%, transparent 55%), var(--bg);
      color: var(--text); padding: 1.5rem;
    }
    main {
      max-width: 36rem; width: 100%; text-align: center;
      border: 1px solid rgba(56, 189, 248, 0.35); border-radius: 14px;
      padding: 2rem 1.75rem; background: rgba(8, 12, 20, 0.92);
    }
    h1 { font-size: clamp(1.5rem, 4vw, 2rem); color: var(--gold); margin: 0 0 0.75rem; }
    p { line-height: 1.65; margin: 0 0 1rem; }
    a.btn {
      display: inline-block; margin-top: 0.5rem; padding: 0.75rem 1.35rem;
      border-radius: 8px; border: 1px solid var(--phi); color: var(--phi);
      text-decoration: none; font-weight: 600;
    }
  </style>
  <script>
    (function () {
      var dest = "/field";
      try {
        if (location.search) dest = "/" + location.search + (location.hash || "#command");
        else if (location.hash) dest = "/" + location.hash;
      } catch (_) {}
      setTimeout(function () { location.replace(dest); }, 600);
    })();
  </script>
</head>
<body>
  <main>
    <h1>Universal Protector</h1>
    <p>Autonomous being stack online — Super Intelligence, 3D/4D networks-of-networks spatial lattice, lethal chain armed. Threat posture HIGH.</p>
    <p><a class="btn" href="/">Open command panel</a></p>
    <noscript><a href="/">Open panel</a></noscript>
  </main>
</body>
</html>
