<text x="722" y="122" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">panel-launched.boot</text>
<text x="722" y="138" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">open /field</text><rect x="220" y="210" width="460" height="70" rx="4" fill="#141810" stroke="#6f9a52" stroke-width="1.5"/>
