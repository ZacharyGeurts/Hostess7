<text x="232" y="252" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">first-boot.complete — full impl once</text>
<text x="232" y="268" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">boot-impl.last — mode=refresh each boot</text></svg>
