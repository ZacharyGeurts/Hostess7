<text x="552" y="122" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">integrity verify</text>
<text x="552" y="138" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">panel + watchers</text><line x1="690" y1="130" x2="710" y2="130" stroke="#5a7a3a" stroke-width="2" marker-end="url(#arrow)"/><rect x="710" y="80" width="150" height="100" rx="4" fill="#141810" stroke="#2a3324" stroke-width="1.5"/>
