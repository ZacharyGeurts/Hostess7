<text x="42" y="138" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">nexus-boot-impl.sh</text><line x1="180" y1="130" x2="200" y2="130" stroke="#5a7a3a" stroke-width="2" marker-end="url(#arrow)"/><rect x="200" y="80" width="150" height="100" rx="4" fill="#1a1f14" stroke="#2a3324" stroke-width="1.5"/>
