<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" width="920" height="360" role="img">
<rect width="920" height="360" fill="#060806"/>
<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5a7a3a"/></marker></defs>
<rect x="40" y="40" width="200" height="90" rx="4" fill="#1a1f14" stroke="#2a3324" stroke-width="1.5"/>
<text x="52" y="62" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Arrive</text>
<text x="52" y="82" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">posture · scan</text>
<text x="52" y="98" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">always allowed</text><rect x="260" y="40" width="200" height="90" rx="4" fill="#141810" stroke="#2a3324" stroke-width="1.5"/>
<text x="272" y="62" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Transform</text>
<text x="272" y="82" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">WRDT dry-run</text>
<text x="272" y="98" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">wave shed if warm</text><rect x="480" y="40" width="200" height="90" rx="4" fill="#1a1f14" stroke="#2a3324" stroke-width="1.5"/>
<text x="492" y="62" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Commit</text>
<text x="492" y="82" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">underlay lock</text>
<text x="492" y="98" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">blocked only at crit</text><rect x="700" y="40" width="180" height="90" rx="4" fill="#141810" stroke="#6f9a52" stroke-width="1.5"/>
<text x="712" y="62" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Reboot</text>
<text x="712" y="82" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">KILROY Field</text>
<text x="712" y="98" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">crit gate only</text><line x1="240" y1="85" x2="260" y2="85" stroke="#5a7a3a" stroke-width="2" marker-end="url(#arrow)"/><line x1="460" y1="85" x2="480" y2="85" stroke="#5a7a3a" stroke-width="2" marker-end="url(#arrow)"/><line x1="680" y1="85" x2="700" y2="85" stroke="#5a7a3a" stroke-width="2" marker-end="url(#arrow)"/><rect x="40" y="160" width="400" height="100" rx="4" fill="#141810" stroke="#6f9a52" stroke-width="1.5"/>
<text x="52" y="182" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">No surprise slowdowns</text>
<text x="52" y="202" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">NEXUS_FIELD_NO_UNEXPECTED_SLOWDOWN=1</text>
<text x="52" y="218" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">quota holds at field-max unless crit</text>
<text x="52" y="234" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">wave shed — not quota cuts at warn</text><rect x="460" y="160" width="420" height="100" rx="4" fill="#141810" stroke="#4d8ab8" stroke-width="1.5"/>
<text x="472" y="182" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Thermal + conversion</text>
<text x="472" y="202" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">field-switch-safety.py preflight</text>
<text x="472" y="218" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">conversion_ok · slowdown_guard</text>
<text x="472" y="234" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">non-destructive · same paths</text><rect x="40" y="280" width="840" height="60" rx="4" fill="#1a1f14" stroke="#2a3324" stroke-width="1.5"/>
<text x="52" y="302" fill="#7faa55" font-family="Segoe UI,system-ui,sans-serif" font-size="13" font-weight="600">Markers</text>
<text x="52" y="322" fill="#c5d4b0" font-family="Consolas,monospace" font-size="11">hotspot_advisory → wave shed  |  thermal_crit → defer commit/reboot  |  refresh stays light</text></svg>
