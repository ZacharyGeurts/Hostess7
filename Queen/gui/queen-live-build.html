<div id=s>Loading…</div><pre id=t></pre>
<script>
fetch('/home/default/Desktop/SG/NewLatest/Queen/data/queen-live-watch.json?'+Date.now()).then(r=>r.json()).then(d=>{

}).catch(e=>{document.getElementById('s').textContent='waiting…';});
