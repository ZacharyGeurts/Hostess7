  <link rel="stylesheet" href="queen-modern.css" data-queen-theme="1" />

  <link rel="icon" href="assets/branding/queen-favicon-48.png" type="image/png" sizes="48x48" />

<body class="queen-system-info-page qw" data-queen-surface="system-info">
  <header class="gr-hero gr-hero--compact qsi-hero">
    <div class="gr-hero-inner">
      <p class="gr-eyebrow">Queen Game Room · CHIPS silicon</p>
      <h1 class="gr-title" id="qsi-title">System Info</h1>

    </div>
    <div class="gr-hero-actions">
      <a class="gr-btn gr-btn--gold" id="qsi-launch" href="/world/queen-game-room.html">Launch in Game Room</a>

  </header>

  <main class="qsi-main" id="qsi-root">
    <p class="qsi-loading">Loading system info…</p>
  </main>

  <script src="queen-system-info.js" defer></script>
  <script src="queen-field-chrome.js" defer></script>
