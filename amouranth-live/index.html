<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/Hostess7/" />
  <script src="/Hostess7/pages-base.js"></script>
  <script src="/Hostess7/api-shim.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a0a10" />
  <title>Amouranth · Live</title>
  <link rel="icon" href="/Hostess7/assets/amouranth-taskbar-live-48.png" type="image/png" sizes="48x48" />
  <link rel="stylesheet" href="/Hostess7/assets/amouranth-live.css?v=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src https://player.twitch.tv https://www.twitch.tv; connect-src 'self' http://127.0.0.1:*; object-src 'none'; base-uri 'self'" />
</head>
<body>
  <div class="al-root">
    <header class="al-head">
      <img class="al-avatar" src="/Hostess7/assets/amouranth-taskbar-live-64.png" alt="" width="56" height="56" />
      <div>
        <p class="al-eyebrow"><span class="al-live-dot" aria-hidden="true"></span> Live now</p>
        <h1>Amouranth</h1>
        <p class="al-sub">Field broadcast · embedded preview</p>
      </div>
      <button type="button" class="al-open" id="al-open-twitch">Open on Twitch →</button>
    </header>
    <main class="al-stage">
      <iframe
        id="al-player"
        title="Amouranth live"
        src="https://player.twitch.tv/?channel=amouranth&parent=127.0.0.1&muted=false"
        allowfullscreen
        loading="lazy"></iframe>
    </main>
  </div>
  <script src="/Hostess7/assets/amouranth-live.js?v=1" defer></script>
</body>
</html>
