; AmmoOS Image — G16 native file for meson (field_opt default; no RTX required)
[binaries]
c = 'g16'
cpp = 'g++16'
ar = 'ar'
strip = 'strip'
pkgconfig = 'pkg-config'

[built-in options]
c_std = 'gnu17'
cpp_std = 'gnu++26'
buildtype = 'debugoptimized'
b_ndebug = 'if-release'

[constants]
common_flags = ['-O3', '-march=native', '-ftree-vectorize', '-funroll-loops', '-fomit-frame-pointer', '-DFIELD_AMMOOS_G16_OPT=1', '-DFIELD_AMMOOS_OS=1']

[project options]
; RTX paths gated at runtime — build always field_opt capable