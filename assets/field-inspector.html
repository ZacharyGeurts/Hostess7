<div id="field-inspector" class="field-inspector" aria-label="Field clarity inspector">
  <header class="field-inspector-head">
    <button type="button" id="field-inspector-toggle" class="field-inspector-toggle" title="Collapse field inspector">◧</button>
    <strong class="field-inspector-title">Field Clarity</strong>
    <span class="field-inspector-ver" id="field-inspector-ver">v10.0</span>
  </header>
  <div class="field-inspector-body" id="field-inspector-body">
    <input id="field-search" type="search" placeholder="search any field (score/geo/dns/antenna)" autocomplete="off" spellcheck="false" />
    <div id="field-explain" class="field-explain hidden" role="status"></div>
    <div id="field-list" class="field-list"></div>
  </div>
</div>
